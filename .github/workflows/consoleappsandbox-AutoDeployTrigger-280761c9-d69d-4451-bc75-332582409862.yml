name: Trigger auto deployment for consoleappsandbox

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/consoleappsandbox-AutoDeployTrigger-280761c9-d69d-4451-bc75-332582409862.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CONSOLEAPPSANDBOX_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CONSOLEAPPSANDBOX_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CONSOLEAPPSANDBOX_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: ./ConsoleAppSandbox/Dockerfile
          registryUrl: mycontainerapp8.azurecr.io
          registryUsername: ${{ secrets.CONSOLEAPPSANDBOX_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CONSOLEAPPSANDBOX_REGISTRY_PASSWORD }}
          containerAppName: consoleappsandbox
          resourceGroup: DefaultResourceGroup-WEU
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}




